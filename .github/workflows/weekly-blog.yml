name: Génération automatique d'article de blog

on:
  schedule:
    # Tous les lundis et jeudis à 7h00 UTC (8h/9h heure de Paris selon saison)
    - cron: '0 7 * * 1'
    - cron: '0 7 * * 4'
  workflow_dispatch: {}
    # Permet aussi de le lancer manuellement depuis l'onglet "Actions" sur GitHub,
    # utile pour tester sans attendre le prochain lundi/jeudi.

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-article:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Générer le nouvel article
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/generate_article.py

      - name: Créer une Pull Request pour relecture
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "Blog automatique : nouvel article de la semaine"
          branch: blog-auto-${{ github.run_number }}
          title: "🤖 Nouvel article de blog généré automatiquement"
          body: |
            Cet article a été généré automatiquement par le script hebdomadaire.

            **Avant de fusionner (merge) cette Pull Request :**
            1. Clique sur l'onglet "Files changed" pour relire l'article généré
            2. Vérifie qu'il n'y a pas d'erreur sur les tarifs, les villes ou le ton
            3. Netlify a normalement généré un aperçu (deploy preview) — cherche le lien
               dans les commentaires de cette Pull Request pour voir le rendu visuel réel
            4. Si tout est bon, clique "Merge pull request" → l'article passe en ligne automatiquement
            5. Si quelque chose ne va pas, tu peux éditer directement le fichier HTML dans
               cette Pull Request avant de merger, ou fermer la Pull Request sans la fusionner
          labels: blog-automatique
